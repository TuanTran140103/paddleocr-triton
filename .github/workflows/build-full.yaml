name: Build and Push PaddleOCR-VL Full Image

on:
  push:
    branches: [ main ]
    paths:
      - 'modal.Dockerfile'   # Chỉ run khi Dockerfile thay đổi
      - 'start.sh'           # Hoặc start.sh thay đổi
  workflow_dispatch:         # Run manual từ tab Actions

jobs:
  build-full:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Full image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: modal.Dockerfile      # Tên file bạn sẽ upload
          push: true
          tags: tuantran2003/paddleocr-vl-full:latest
          platforms: linux/amd64
          # no-cache: true              # Build sạch để tránh lỗi cache cũ
          cache-from: type=gha
          cache-to: type=gha,mode=max